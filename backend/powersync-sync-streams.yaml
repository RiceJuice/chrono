config:
  edition: 3

streams:
  appointments_calendar:
    auto_subscribe: true
    query: SELECT * FROM calendar_events
  
  appointments_calendar_series:
    auto_subscribe: true
    query: |
      SELECT
        id,
        event_name,
        rrule,
        start_time,
        end_time,
        location,
        type,
        choir,
        voices,
        schooltrack,
        class,
        NULL::text AS diet,
        series_start,
        series_end,
        subject_id
      FROM calendar_series

  reference_subjects:
    auto_subscribe: true
    query: SELECT id, name, default_color FROM subjects

  profile_self:
    auto_subscribe: true
    query: SELECT * FROM profiles WHERE id = auth.user_id()

  profile_linked_children:
    auto_subscribe: true
    query: |
      SELECT id, first_name, last_name, class_name, schooltrack, voice, choir, diet, role,
             created_at, updated_at, onboarding_completed_at
      FROM profiles
      WHERE id IN (
        SELECT child_id FROM guardian_child_links
        WHERE guardian_id = auth.user_id() AND status = 'confirmed'
      )

  guardian_links:
    auto_subscribe: true
    query: |
      SELECT * FROM guardian_child_links
      WHERE guardian_id = auth.user_id()
         OR child_id = auth.user_id()

  reference_klassen:
    auto_subscribe: true
    query: SELECT class_name AS id, class_name FROM klassen

  event_schedules:
    auto_subscribe: true
    query: SELECT * FROM event_schedules

  homework_syntax_suggestions:
    auto_subscribe: true
    query: |
      SELECT * FROM homework_syntax_suggestions
      WHERE is_global = true OR created_by = auth.user_id()

  homework_contributions:
    auto_subscribe: true
    query: |
      SELECT h.* FROM homework_contributions h
      JOIN profiles p ON p.id = auth.user_id()
      WHERE h.class_name = p.class_name
        AND (
          h.schooltrack IS NULL
          OR p.schooltrack IS NULL
          OR h.schooltrack::text = p.schooltrack::text
        )

  homework_tasks:
    auto_subscribe: true
    query: SELECT * FROM homework_tasks WHERE profile_id = auth.user_id()
