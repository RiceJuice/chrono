config:
  edition: 3

streams:
  appointments_calendar:
    auto_subscribe: true
    query: SELECT * FROM calendar_events
  
  appointments_calendar_series:
    auto_subscribe: true
    query: |
      SELECT
        id,
        event_name,
        rrule,
        start_time,
        end_time,
        location,
        type,
        choir,
        voices,
        schooltrack,
        class,
        NULL::text AS diet,
        series_start,
        series_end,
        subject_id
      FROM calendar_series

  reference_subjects:
    auto_subscribe: true
    query: SELECT id, name, default_color FROM subjects

  profile_self:
    auto_subscribe: true
    query: SELECT * FROM profiles WHERE id = auth.user_id()

  reference_klassen:
    auto_subscribe: true
    query: SELECT class_name AS id, class_name FROM klassen

  event_schedules:
    auto_subscribe: true
    query: SELECT * FROM event_schedules
