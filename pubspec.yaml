name: chronoapp
description: "Chrono. Dein persönlicher All-in-One-Kalender"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+22

environment:
  sdk: ^3.11.3

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  figma_squircle: ^0.6.2
  table_calendar: ^3.2.0
  # Beides auf die neue Generation heben:
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  intl: ^0.20.2
  google_fonts: ^8.0.2
  go_router: ^17.1.0
  flutter_svg: ^2.2.4
  powersync: ^2.1.0
  postgrest: ^2.6.0
  supabase_flutter: ^2.12.2
  app_links: ^7.0.0
  path: ^1.9.1
  path_provider: ^2.1.5
  sqlite3: ^3.3.1
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  rrule: ^0.2.18
  scrollable_positioned_list: ^0.3.8
  open_mail: ^1.2.1
  blur: ^4.0.2
  package_info_plus: ^9.0.1
  shared_preferences: ^2.5.5
  internet_connection_checker: 3.0.1
  flutter_colorpicker: ^1.1.0
  phosphor_flutter: ^2.1.0
  cupertino_native_better: ^1.4.6
  image_picker: ^1.2.2
  file_picker: ^8.1.7
  mime: ^2.0.0
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0
  image: ^4.8.0
  smooth_sheets: ^1.0.2
  inspire_blur: ^0.1.0
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^8.1.0
  crypto: ^3.0.7
  lottie: ^3.3.3
  live_activities: ^2.4.9
  flutter_local_notifications: ^19.0.0
  timezone: ^0.10.0
  record: ^6.0.0
  pitch_detector_dart: ^0.0.7
  audioplayers: ^6.4.0
  home_widget: ^0.9.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Auch die Dev-Tools müssen mitziehen:
  riverpod_generator: ^4.0.3
  build_runner: ^2.13.1
  flutter_native_splash: ^2.4.6
  flutter_launcher_icons: ^0.14.4

flutter_native_splash:
  color: "#CBBBA0"
  color_dark: "#111827"
  android_12:
    color: "#CBBBA0"
    color_dark: "#111827"
  android: true
  ios: true
  web: false

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#111827"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  min_sdk_android: 21

flutter:

  uses-material-design: true


  assets:
    - assets/domspatzen.svg
    - assets/domspatzen_compact.svg
    - assets/icon/app_icon_foreground.png
    - assets/icon/google_g.svg
    - assets/Carusell/
    - assets/lottie/login_success.json
    - assets/audio/piano_a440.wav

