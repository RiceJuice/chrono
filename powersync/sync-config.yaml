# Adds YAML Schema support for VSCode users with the YAML extension installed. This enables features like validation and autocompletion based on the provided schema.
# yaml-language-server: $schema=https://unpkg.com/@powersync/service-sync-rules@latest/schema/sync_rules.json

# See https://docs.powersync.com/sync/advanced/compatibility
config:
  edition: 3

# Define Sync Streams to control which data is synced to each user
# Docs: https://docs.powersync.com/sync/streams/overview
streams:
  appointments_calendar:
    auto_subscribe: true
    query: |
      SELECT
        id,
        event_name,
        description,
        location,
        note,
        start_time,
        end_time,
        type,
        choir,
        voices,
        schooltrack,
        class,
        diet,
        image_paths,
        series_id,
        recurrence_id
      FROM calendar_events

  appointments_calendar_series:
    auto_subscribe: true
    query: |
      SELECT
        id,
        event_name,
        rrule,
        start_time,
        end_time,
        location,
        type,
        choir,
        voices,
        schooltrack,
        class,
        NULL::text AS diet,
        series_start,
        series_end,
        subject_id
      FROM calendar_series

  reference_subjects:
    auto_subscribe: true
    query: SELECT id, name, default_color FROM subjects

  profile_self:
    auto_subscribe: true
    query: |
      SELECT
        id,
        first_name,
        last_name,
        class_name,
        schooltrack,
        voice,
        choir,
        diet,
        role,
        calendar_preferences,
        onboarding_completed_at,
        active_child_id,
        created_at,
        updated_at
      FROM profiles
      WHERE id = auth.user_id()

  profile_linked_children:
    auto_subscribe: true
    query: |
      SELECT id, first_name, last_name, class_name, schooltrack, voice, choir, diet, role,
             created_at, updated_at, onboarding_completed_at
      FROM profiles
      WHERE id IN (
        SELECT child_id FROM guardian_child_links
        WHERE guardian_id = auth.user_id() AND status = 'confirmed'
      )

  guardian_links:
    auto_subscribe: true
    query: |
      SELECT
        id,
        guardian_id,
        child_id,
        status,
        created_at,
        responded_at,
        reminder_sent_at,
        child_share_permissions
      FROM guardian_child_links
      WHERE guardian_id = auth.user_id()
         OR child_id = auth.user_id()

  reference_klassen:
    auto_subscribe: true
    query: SELECT class_name AS id, class_name FROM klassen

  event_schedules:
    auto_subscribe: true
    query: |
      SELECT
        id,
        event_id,
        title,
        description,
        location,
        start_time,
        end_time,
        choir,
        voices,
        created_at
      FROM event_schedules

  homework_syntax_suggestions:
    auto_subscribe: true
    query: |
      SELECT
        id,
        category,
        label,
        shorthand,
        aliases,
        insert_template,
        chip_color_key,
        sort_order,
        is_global,
        created_by,
        created_at
      FROM homework_syntax_suggestions
      WHERE is_global = true OR created_by = auth.user_id()

  homework_contributions:
    auto_subscribe: true
    query: |
      SELECT
        h.id,
        h.profile_id,
        h.class_name,
        h.schooltrack,
        h.subject_id,
        h.lesson_date,
        h.fragments,
        h.fragment_hashes,
        h.created_at,
        h.updated_at
      FROM homework_contributions h
      JOIN profiles p ON p.id = auth.user_id()
      WHERE h.class_name = p.class_name
        AND (
          h.schooltrack IS NULL
          OR p.schooltrack IS NULL
          OR h.schooltrack::text = p.schooltrack::text
        )

  homework_tasks:
    auto_subscribe: true
    query: |
      SELECT
        id,
        profile_id,
        title,
        fragments,
        plain_text,
        subject_id,
        is_completed,
        completed_at,
        due_at,
        due_source,
        contribution_id,
        created_at,
        updated_at
      FROM homework_tasks
      WHERE profile_id = auth.user_id()
         OR profile_id IN (
           SELECT child_id
           FROM guardian_child_links
           WHERE guardian_id = auth.user_id()
             AND status = 'confirmed'
             AND child_share_permissions->>'homework' = 'true'
         )

  homework_peer_dismissals:
    auto_subscribe: true
    query: |
      SELECT
        id,
        profile_id,
        canonical_key,
        subject_id,
        lesson_date,
        created_at
      FROM homework_peer_dismissals
      WHERE profile_id = auth.user_id()
         OR profile_id IN (
           SELECT child_id
           FROM guardian_child_links
           WHERE guardian_id = auth.user_id()
             AND status = 'confirmed'
             AND child_share_permissions->>'homework' = 'true'
         )
